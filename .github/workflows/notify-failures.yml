name: Notify Failures (hourly)

# 1時間おきに、未解決かつ24時間以内に通知していない sync_failures を
# Notion 失敗ログページに追記する。0件ならスキップ（Notion は触らない）。

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 * * * *'

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_MAIN_DB_ID: ${{ secrets.NOTION_MAIN_DB_ID }}
      NOTION_SYNC_LOG_PAGE_ID: ${{ secrets.NOTION_SYNC_LOG_PAGE_ID }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Run notify
        run: npm run sync:notify-failures
