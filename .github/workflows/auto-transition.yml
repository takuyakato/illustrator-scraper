name: Auto Transition (daily JST 03:00)

# 1日1回 JST 03:00 = UTC 18:00 に、連絡中+30日経過のレコードを返信なしに遷移する。
# Supabase RPC 実行 + Notion ページの master_status/note を直接更新する合わせ技。

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 18 * * *'

jobs:
  transition:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_MAIN_DB_ID: ${{ secrets.NOTION_MAIN_DB_ID }}
      NOTION_SYNC_LOG_PAGE_ID: ${{ secrets.NOTION_SYNC_LOG_PAGE_ID }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run auto-transition
        run: npm run sync:auto-transition
